let selectedPayment='cod';
function openCheckoutModal(){
  if(cart.length===0){toast('⚠','Cart is empty');return}
  document.getElementById('checkout-overlay').classList.add('show');
  updateCheckoutSummary();
  document.getElementById('checkout-confirm').classList.remove('show');
  document.getElementById('checkout-body').style.display='grid';
}
window.openCheckoutModal=openCheckoutModal;

function closeCheckoutModal(){
  document.getElementById('checkout-overlay').classList.remove('show');
}
window.closeCheckoutModal=closeCheckoutModal;

function selectPayment(el){
  document.querySelectorAll('.checkout-pay-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selectedPayment=el.dataset.value;
}
window.selectPayment=selectPayment;

function updateCheckoutSummary(){
  const el=document.getElementById('co-summary');
  if(!el)return;
  const sub=cart.reduce((s,i)=>s+i.price,0);
  const ship=800;
  el.innerHTML=`
    <div class="checkout-summary-items">${cart.map(i=>`<div class="checkout-summary-item"><span class="checkout-summary-name">${i.name}</span><span class="checkout-summary-qty">x1</span><span class="checkout-summary-price">${fmt(i.price)}</span></div>`).join('')}</div>
    <div class="checkout-summary-shipping"><span>Shipping</span><span>${fmt(ship)}</span></div>
    <div class="checkout-summary-total"><span>Total</span><span class="val">${fmt(sub+ship)}</span></div>`;
}

function placeOrder(){
  const first=document.getElementById('co-first').value.trim();
  const phone=document.getElementById('co-phone').value.trim();
  const wilaya=document.getElementById('co-wilaya').value;
  const address=document.getElementById('co-address').value.trim();
  if(!first){toast('⚠','First name required');document.getElementById('co-first').focus();return}
  if(!phone){toast('⚠','Phone required');document.getElementById('co-phone').focus();return}
  if(!wilaya){toast('⚠','Select wilaya');return}
  if(!address){toast('⚠','Address required');return}
  const sub=cart.reduce((s,i)=>s+i.price,0);
  const orderId='FLY'+Date.now().toString().slice(-6);
  const order={id:orderId,customer:{name:first,phone:phone,wilaya:wilaya,address:address},items:[...cart],subtotal:sub,shipping:800,total:sub+800,payment:selectedPayment,date:new Date().toISOString(),status:'pending'};
  orders.unshift(order);
  saveOrders();
  cart=[];
  saveCart();
  renderCart();
  updateStats();
  document.getElementById('checkout-body').style.display='none';
  document.getElementById('co-tracking').textContent=orderId;
  document.getElementById('checkout-confirm').classList.add('show');
  addNotification('ORDER PLACED','#'+orderId+' — '+fmt(sub+800));
  toast('✅ Order Placed','#'+orderId+' confirmed!');
}
window.placeOrder=placeOrder;

// ─── CART PANEL ───
function openCartPanel(){
  renderCartPanel();
  document.getElementById('cart-panel-overlay').classList.add('show');
}
window.openCartPanel=openCartPanel;

function closeCartPanel(){
  document.getElementById('cart-panel-overlay').classList.remove('show');
}
window.closeCartPanel=closeCartPanel;

function renderCartPanel(){
  const items=document.getElementById('cart-panel-items');
  const subEl=document.getElementById('cp-subtotal');
  const totalEl=document.getElementById('cp-total');
  if(!items)return;
  if(cart.length===0){
    items.innerHTML='<div class="cart-panel-empty"><div class="cart-panel-empty-icon">🛒</div><p>Your cart is empty</p></div>';
    if(subEl)subEl.textContent='0 DZD';
    if(totalEl)totalEl.textContent='0 DZD';
    return;
  }
  const sub=cart.reduce((s,i)=>s+i.price,0);
  const ship=800;
  if(subEl)subEl.textContent=fmt(sub);
  if(totalEl)totalEl.textContent=fmt(sub+ship);
  items.innerHTML=cart.map((item,i)=>`
    <div class="cart-panel-item">
      <div class="cart-panel-item-icon">${item.icon||'📦'}</div>
      <div class="cart-panel-item-info">
        <div class="cart-panel-item-name">${item.name}</div>
        <div class="cart-panel-item-meta">SIZE: ${item.size||'M'}</div>
        <div class="cart-panel-item-price">${fmt(item.price)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <button class="cart-panel-remove-btn" onclick="removeFromCart(${i});renderCartPanel()">Remove</button>
      </div>
    </div>`).join('');
}

// ─── PRODUCT MODAL ───
let modalProductId=null;
let modalSelectedSize=null;
function openProductModal(id){
  const p=products.find(x=>x.id===id);
  if(!p)return;
  modalProductId=id;
  modalSelectedSize=p.sizes?p.sizes[0]:'M';
  document.getElementById('pm-img').textContent=p.icon||'📦';
  document.getElementById('pm-collection').textContent=(p.coll||'').toUpperCase();
  document.getElementById('pm-name').textContent=p.name;
  document.getElementById('pm-price').textContent=fmt(p.price);
  document.getElementById('pm-old').textContent=p.oldPrice?fmt(p.oldPrice):'';
  document.getElementById('pm-desc').textContent=p.desc;
  const sz=p.sizes||['S','M','L','XL'];
  const sizeContainer=document.getElementById('pm-sizes');
  sizeContainer.innerHTML=sz.map(s=>`<div class="product-modal-size-btn${s===modalSelectedSize?' selected':''}" onclick="selectModalSize(this,'${s}')">${s}</div>`).join('');
  const stockEl=document.getElementById('pm-stock');
  if(p.stock===0){stockEl.textContent='Out of stock';stockEl.className='product-modal-stock out';document.getElementById('pm-add-btn').disabled=true}
  else if(p.stock<=5){stockEl.textContent='⚠ Only '+p.stock+' left';stockEl.className='product-modal-stock low';document.getElementById('pm-add-btn').disabled=false}
  else{stockEl.textContent='In stock';stockEl.className='product-modal-stock';document.getElementById('pm-add-btn').disabled=false}
  document.getElementById('product-modal-overlay').classList.add('show');
}
window.openProductModal=openProductModal;

function closeProductModal(){
  document.getElementById('product-modal-overlay').classList.remove('show');
}
window.closeProductModal=closeProductModal;

function selectModalSize(el,size){
  document.querySelectorAll('.product-modal-size-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  modalSelectedSize=size;
}
window.selectModalSize=selectModalSize;

function addModalToCart(){
  if(modalProductId)addToCart(modalProductId);
  closeProductModal();
}
window.addModalToCart=addModalToCart;

// ─── SCROLL TO PRODUCTS ───
function scrollToProducts(){
  const hero=document.getElementById('hero');
  if(hero&&hero.style.display!=='none'){
    const section=document.getElementById('collections-showcase-section');
    if(section)section.scrollIntoView({behavior:'smooth'});
  }else{
    focusWindow('products');
  }
}
window.scrollToProducts=scrollToProducts;

// ─── ESCAPE HTML ───
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ─── KEYBOARD ───
document.addEventListener('keydown',e=>{
  const t=e.target.tagName;
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openCommandPalette();return}
  if((e.metaKey||e.ctrlKey)&&e.key==='r'){e.preventDefault();toggleCurrency();return}
  if(t==='INPUT'||t==='TEXTAREA'||t==='SELECT')return;
  if(e.key==='Escape'){closeCommandPalette();hideContext();return}
  const k=e.key.toUpperCase();
  const cmd=COMMANDS.find(c=>c.key===k);
  if(cmd){cmd.action()}
});

// ─── INIT ───
async function init(){
  loadData();
  updateClock();setInterval(updateClock,1000);
  setLang(lang);
  renderProducts();
  renderCart();
  updateStats();
  updateShowcaseCounts();
  const dock=document.getElementById('dock');
  if(dock)dock.classList.add('hidden');
  const loadFill=document.getElementById('load-fill');
  const loadText=document.getElementById('load-text');
  const steps=['INITIALIZING SYSTEM...','LOADING PRODUCTS...','CALIBRATING 3D ENGINE...','READY'];
  for(let i=0;i<=100;i+=2){
    await new Promise(r=>setTimeout(r,20));
    if(loadFill)loadFill.style.width=i+'%';
    if(loadText&&i<30)loadText.textContent=steps[0];
    else if(loadText&&i<60)loadText.textContent=steps[1];
    else if(loadText&&i<90)loadText.textContent=steps[2];
    else if(loadText&&i===100)loadText.textContent=steps[3];
  }
  await new Promise(r=>setTimeout(r,400));
  document.getElementById('loading-screen').classList.add('hidden');
  initThreeJS();
  initHeroParticles();
  initFadeObserver();
  // Hero animations
  setTimeout(()=>{
    document.querySelectorAll('.hero-eyebrow,.hero-title,.hero-sub,.hero-desc,.hero-actions').forEach((el,i)=>{
      setTimeout(()=>el.classList.add('visible'),i*150);
    });
  },300);
}

// ─── COMMAND PALETTE SEARCH ───
document.getElementById('cmd-search')?.addEventListener('input',renderCommands);
document.getElementById('cmd-search')?.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeCommandPalette();
  else if(e.key==='Enter'){
    const first=document.querySelector('.cmd-item');
    if(first){const c=COMMANDS.find(c=>c.id===first.dataset.id);if(c){closeCommandPalette();c.action()}}
  }
});
  document.getElementById('cmd-overlay')?.addEventListener('click',e=>{if(e.target===e.currentTarget)closeCommandPalette()});

document.addEventListener('DOMContentLoaded',init);

// Expose to window
window.loadData=loadData;
window.saveProducts=saveProducts;
window.renderProducts=renderProducts;
window.addToCart=addToCart;
window.renderCart=renderCart;
window.addNotification=addNotification;
window.updateDropTimers=updateDropTimers;

})();
</script>
