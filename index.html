<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,viewport-fit=cover">
<title>FLYRA — صعود بلا حدود | Algerian Fashion</title>
<meta name="theme-color" content="#0A0F1E">
<meta name="description" content="FLYRA — The iconic Algerian fashion brand. Streetwear, Old Money, Heritage, Sport. 3D, AI, immersive. From Algeria to the World.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0.6' y2='1'%3E%3Cstop offset='0%25' stop-color='%23C49B3D'/%3E%3Cstop offset='100%25' stop-color='%237BA3C9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M20 6 L28 16 L20 26 L12 16 Z' fill='url(%23g)'/%3E%3Cpath d='M20 9 L24 16 L20 23 L16 16 Z' fill='%230A0F1E' opacity='.5'/%3E%3Ccircle cx='20' cy='16' r='2' fill='%23C49B3D'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--midnight:#0A0F1E;--sky:#7BA3C9;--amber:#C49B3D;--cream:#F5F0E8;--cloud:#E8EDF2;--raven:#1A2235;--sunset:#D4956A;--green:#3FB950;--red:#F85149;--orange:#E3B341;--text:#E8EDF2;--sub:rgba(232,237,242,0.45);--border:rgba(255,255,255,0.06);--subtext:rgba(232,237,242,0.5);--glow:0 0 40px rgba(196,155,61,0.15);--ease:cubic-bezier(0.34,1.56,0.64,1);--cyan:#00D4FF;--purple:#A855F7;--pink:#F472B6;--yellow:#FBBF24}
html{scroll-behavior:smooth}
body{background:var(--midnight);color:var(--text);font-family:'Inter',-apple-system,sans-serif;overflow-x:hidden;cursor:default;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;min-height:100vh;width:100%}
html[dir="rtl"] body{font-family:'Noto Sans Arabic',sans-serif}
::selection{background:var(--amber);color:var(--midnight)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--amber);border-radius:2px}
/* ─── LOADER ─── */
#loading-screen{position:fixed;inset:0;z-index:100000;background:var(--midnight);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease,visibility 0.6s ease}
#loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.load-logo{font-size:4rem;font-weight:900;letter-spacing:0.08em;color:var(--cream);position:relative;margin-bottom:32px}
.load-logo::after{content:'';position:absolute;bottom:-8px;left:0;width:0;height:2px;background:var(--amber);animation:loader-line 1.5s ease infinite}
@keyframes loader-line{0%,100%{width:0;left:0}50%{width:100%;left:0}51%{width:0;left:auto;right:0}}
.load-ring{width:56px;height:56px;border:3px solid rgba(255,255,255,0.06);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-track{width:220px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:16px}
.load-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--amber),var(--sky));border-radius:2px;transition:width 0.3s ease}
.load-text{font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
#three-container{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.35}
#three-container.interactive{pointer-events:all}
#app{position:relative;z-index:1;min-height:100vh}
/* ─── STATUS BAR ─── */
.statusbar{position:fixed;top:0;left:0;right:0;height:32px;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:center;padding:0 18px;font-size:10px;z-index:9999;border-bottom:1px solid var(--border);-webkit-user-select:none;user-select:none}
.statusbar-left{display:flex;align-items:center;gap:12px;font-weight:700;letter-spacing:0.05em}
.statusbar-left .logo{background:linear-gradient(135deg,var(--amber),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900}
.statusbar-right{margin-left:auto;display:flex;align-items:center;gap:14px;opacity:0.6}
.statusbar-right .sep{opacity:0.3}
.currency-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,0.08);cursor:pointer;border:1px solid var(--border);transition:all 0.15s}
.currency-badge:hover{background:rgba(255,255,255,0.15)}
/* ─── HERO ─── */
.hero-section{min-height:100vh;display:flex;align-items:center;position:relative;padding:80px 60px 0;overflow:hidden}
.hero-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 55%,rgba(123,163,201,0.12) 0%,transparent 55%),radial-gradient(ellipse at 80% 15%,rgba(196,155,61,0.08) 0%,transparent 45%),radial-gradient(ellipse at 60% 80%,rgba(26,34,53,0.5) 0%,transparent 50%),var(--midnight);pointer-events:none}
.hero-grid-overlay{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.hero-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.hero-particle{position:absolute;border-radius:50%;opacity:0;animation:float-up linear infinite}
@keyframes float-up{0%{opacity:0;transform:translateY(0) scale(0.5)}10%{opacity:0.6}90%{opacity:0.6}100%{opacity:0;transform:translateY(-100vh) scale(1)}}
.hero-content{position:relative;z-index:2;max-width:740px;padding-top:40px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(196,155,61,0.08);border:1px solid rgba(196,155,61,0.2);border-radius:30px;font-size:0.65rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--amber);margin-bottom:28px;opacity:0;transform:translateY(20px);transition:all 0.8s ease}
.hero-eyebrow.visible{opacity:1;transform:translateY(0)}
.hero-title{font-size:clamp(3rem,7vw,6rem);font-weight:900;line-height:0.9;letter-spacing:-0.03em;color:var(--cream);margin-bottom:14px;opacity:0;transform:translateY(30px);transition:all 0.8s ease 0.15s}
.hero-title.visible{opacity:1;transform:translateY(0)}
.hero-title .accent{background:linear-gradient(135deg,var(--amber),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(1.2rem,3vw,2.5rem);font-weight:200;letter-spacing:0.3em;color:var(--sky);margin-bottom:20px;opacity:0;transform:translateY(30px);transition:all 0.8s ease 0.3s}
.hero-sub.visible{opacity:1;transform:translateY(0)}
.hero-desc{font-size:1rem;line-height:1.8;color:var(--subtext);max-width:500px;margin-bottom:32px;opacity:0;transform:translateY(30px);transition:all 0.8s ease 0.45s}
.hero-desc.visible{opacity:1;transform:translateY(0)}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;opacity:0;transform:translateY(30px);transition:all 0.8s ease 0.6s}
.hero-actions.visible{opacity:1;transform:translateY(0)}
.hero-visual{position:absolute;right:-40px;top:50%;transform:translateY(-50%);z-index:1;width:480px;height:480px;display:flex;align-items:center;justify-content:center}
.hero-visual svg{width:100%;height:100%;opacity:0.85;animation:bird-float 8s ease-in-out infinite}
@keyframes bird-float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-25px) rotate(2deg)}}
.hero-visual::before{content:'';position:absolute;inset:-40px;background:radial-gradient(circle,rgba(196,155,61,0.08) 0%,transparent 70%);border-radius:50%}
.scroll-indicator{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;opacity:0;animation:fade-in 1s ease 1.5s forwards}
@keyframes fade-in{to{opacity:0.5}}
.scroll-indicator span{font-size:0.6rem;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--subtext)}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--amber),transparent);animation:scroll-line 2s ease-in-out infinite}
@keyframes scroll-line{0%,100%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
.btn-primary{padding:16px 36px;background:var(--amber);color:var(--midnight);font-size:0.8rem;font-weight:800;letter-spacing:0.1em;border:none;border-radius:12px;cursor:pointer;text-decoration:none;transition:all 0.25s var(--ease);font-family:inherit;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(196,155,61,0.5)}
.btn-secondary{padding:16px 36px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--cream);font-size:0.8rem;font-weight:600;letter-spacing:0.1em;border-radius:12px;cursor:pointer;text-decoration:none;transition:all 0.25s;font-family:inherit;display:inline-flex;align-items:center;gap:8px}
.btn-secondary:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.3);transform:translateY(-2px)}
/* ─── DOCK ─── */
.dock{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:flex-end;gap:4px;padding:6px 14px;background:rgba(20,20,25,0.85);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:18px;border:1px solid var(--border);z-index:9999;transition:transform 0.3s,opacity 0.3s}
.dock.hidden{transform:translateX(-50%) translateY(120%);opacity:0;pointer-events:none}
.dock-item{width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;transition:all 0.25s var(--ease);font-size:20px;position:relative;border:none;background:none;color:var(--text)}
.dock-item:hover{transform:translateY(-10px) scale(1.12);background:rgba(255,255,255,0.06)}
.dock-item.active{background:rgba(255,255,255,0.08);transform:translateY(-4px) scale(1.05)}
.dock-item::after{content:attr(data-label);position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:8px;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none;font-weight:600;letter-spacing:0.05em}
.dock-item:hover::after{opacity:0.7}
.dock-item .badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:var(--sunset);border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}
.dock-sep{width:1px;height:32px;background:var(--border);margin:0 4px}
/* ─── WINDOW SYSTEM ─── */
.window{position:fixed;background:rgba(10,10,12,0.93);border:1px solid var(--border);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);transition:box-shadow 0.2s,opacity 0.2s,transform 0.25s var(--ease);min-width:280px;display:none;z-index:100;animation:winIn 0.3s var(--ease) both}
.window.show{display:flex;flex-direction:column}
.window.focused{z-index:200!important}
.window.min{transform:scale(0)!important;opacity:0;pointer-events:none}
.window.max{top:32px!important;left:0!important;width:100%!important;height:calc(100vh - 32px)!important;border-radius:0;z-index:300!important}
@keyframes winIn{from{opacity:0;transform:scale(0.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.win-titlebar{height:36px;display:flex;align-items:center;padding:0 12px;background:rgba(0,0,0,0.4);border-bottom:1px solid var(--border);cursor:grab;flex-shrink:0}
.win-controls{display:flex;gap:7px;margin-right:12px}
.win-controls span{width:12px;height:12px;border-radius:50%;cursor:pointer;transition:all 0.15s;position:relative}
.win-controls span::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);transition:transform 0.15s}
.win-controls span:hover::after{transform:translate(-50%,-50%) scale(1)}
.wc-close{background:#ff5f57}.wc-close:hover::after{content:'×';color:#4a0000;font-size:9px;font-weight:bold}
.wc-min{background:#febc2e}.wc-min:hover::after{content:'−';color:#8a6000;font-size:9px;font-weight:bold}
.wc-max{background:#28c840}.wc-max:hover::after{content:'+';color:#006000;font-size:9px;font-weight:bold}
.win-title{font-size:9px;font-weight:600;letter-spacing:0.08em;opacity:0.5;text-transform:uppercase;flex:1}
.win-content{padding:16px;flex:1;overflow-y:auto;overflow-x:hidden}
.win-content::-webkit-scrollbar{width:3px}
.win-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}
.win-content::-webkit-scrollbar-track{background:transparent}
/* ─── THEMES ─── */
.th-sky{--accent:var(--sky)}
.th-amber{--accent:var(--amber)}
.th-cream{--accent:var(--cream)}
.th-sunset{--accent:var(--sunset)}
.window.th-sky .win-title{color:var(--sky)}
.window.th-amber .win-title{color:var(--amber)}
.window.th-cream .win-title{color:var(--cream)}
.window.th-sunset .win-title{color:var(--sunset)}
.window.th-sky .win-titlebar{border-bottom-color:rgba(123,163,201,0.2)}
.window.th-amber .win-titlebar{border-bottom-color:rgba(196,155,61,0.2)}
.window.th-sky{border-color:rgba(123,163,201,0.12)}
.window.th-amber{border-color:rgba(196,155,61,0.12)}
/* ─── WIDGETS ─── */
.w-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;opacity:0.4;margin-bottom:10px}
/* ─── PRODUCTS ─── */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.product-card{background:rgba(0,0,0,0.4);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.25s;border:1px solid transparent;position:relative}
.product-card:hover{transform:translateY(-4px);border-color:var(--accent,var(--amber));box-shadow:0 8px 24px -8px var(--accent,var(--amber))}
.product-card.sold-out{opacity:0.5}
.product-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,rgba(255,255,255,0.03),rgba(255,255,255,0.07));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin-bottom:10px;position:relative;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.product-tag{position:absolute;top:6px;left:6px;font-size:7px;font-weight:700;letter-spacing:0.1em;padding:2px 7px;border-radius:3px;background:var(--accent,var(--amber));color:#000;z-index:1}
.product-name{font-size:11px;font-weight:600;margin-bottom:4px}
.product-desc{font-size:9px;opacity:0.4;margin-bottom:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-price{font-size:14px;font-weight:800;color:var(--accent,var(--amber))}
.product-old-price{font-size:10px;opacity:0.35;text-decoration:line-through;margin-left:6px}
.product-actions{display:flex;gap:6px;margin-top:8px}
.product-btn{flex:1;padding:6px;border:1px solid var(--accent,var(--amber));background:transparent;color:var(--accent,var(--amber));border-radius:6px;font-size:9px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit}
.product-btn:hover{background:var(--accent,var(--amber));color:#000}
.product-btn.primary{background:var(--accent,var(--amber));color:#000}
.product-btn.primary:hover{filter:brightness(1.1)}
.product-btn:disabled{opacity:0.3;cursor:not-allowed}
.stock-badge{font-size:8px;font-weight:600;margin-top:4px;opacity:0.5}
.stock-badge.low{color:var(--sunset)}
.stock-badge.out{color:#F85149}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:11px;font-family:inherit;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent,var(--amber))}
.search-input::placeholder{opacity:0.3}
.search-filter{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:10px;font-family:inherit;outline:none;cursor:pointer}
.filter-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.filter-tag{padding:3px 9px;border-radius:10px;font-size:8px;font-weight:700;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;background:transparent;color:var(--sub)}
.filter-tag:hover,.filter-tag.active{background:var(--accent,var(--amber));color:#000;border-color:var(--accent,var(--amber))}
/* ─── CART ─── */
.cart-items{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;position:relative}
.cart-item-img{width:44px;height:44px;background:rgba(255,255,255,0.05);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;overflow:hidden}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:11px;font-weight:600}
.cart-item-meta{font-size:9px;opacity:0.4}
.cart-item-price{font-size:12px;font-weight:700;color:var(--accent,var(--amber))}
.cart-item-remove{position:absolute;top:6px;right:6px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;opacity:0.3;cursor:pointer;border-radius:50%;transition:all 0.15s}
.cart-item-remove:hover{opacity:1;background:rgba(248,81,73,0.2);color:#F85149}
.cart-total{padding:10px 0;border-top:1px solid var(--border)}
.cart-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
.cart-row.total{font-size:13px;font-weight:700;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.cart-empty{text-align:center;padding:30px;opacity:0.3;font-size:11px}
.cart-checkout-btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:11px;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;background:var(--accent,var(--amber));color:#000;font-family:inherit;margin-top:8px}
.cart-checkout-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px -6px var(--accent,var(--amber))}
/* ─── COLLECTIONS ─── */
.collection-list{display:flex;flex-direction:column;gap:4px}
.collection-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.15s;border:1px solid transparent}
.collection-item:hover{background:rgba(255,255,255,0.04)}
.collection-item.active{background:rgba(255,255,255,0.06);border-color:var(--border)}
.collection-icon{font-size:18px}
.collection-name{flex:1;font-size:11px;font-weight:600}
.collection-count{font-size:9px;opacity:0.4;background:rgba(255,255,255,0.08);padding:2px 7px;border-radius:8px}
/* ─── AI STYLIST ─── */
.stylist-container{display:flex;flex-direction:column;height:100%}
.stylist-msgs{flex:1;overflow-y:auto;padding-bottom:8px}
.msg{margin-bottom:10px;font-size:11px;line-height:1.6}
.msg-user{text-align:right}
.msg-user .msg-text{background:rgba(255,255,255,0.08);padding:10px 14px;border-radius:12px 12px 4px 12px;display:inline-block;max-width:85%;text-align:left}
.msg-ai .msg-text{padding:10px 14px;border-radius:12px 12px 12px 4px;background:rgba(196,155,61,0.08);border:1px solid rgba(196,155,61,0.12)}
.msg-ai .msg-text .ai-label{font-size:8px;font-weight:700;color:var(--amber);letter-spacing:0.1em;margin-bottom:4px;display:block}
.msg-typing{display:flex;gap:4px;padding:10px 14px}
.msg-typing span{width:5px;height:5px;background:var(--amber);border-radius:50%;animation:typing 1s infinite}
.msg-typing span:nth-child(2){animation-delay:0.15s}
.msg-typing span:nth-child(3){animation-delay:0.3s}
@keyframes typing{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.stylist-input{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border)}
.stylist-input input{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:11px;font-family:inherit;outline:none;transition:border-color 0.2s}
.stylist-input input:focus{border-color:var(--amber)}
.stylist-input input::placeholder{opacity:0.3}
.stylist-input button{background:var(--amber);border:none;border-radius:8px;padding:10px 16px;cursor:pointer;font-weight:700;font-size:10px;color:var(--midnight);transition:transform 0.15s;font-family:inherit}
.stylist-input button:hover{transform:scale(1.05)}
/* ─── 3D VIEWER ─── */
.viewer-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;backdrop-filter:blur(20px)}
.viewer-overlay.show{display:flex}
.viewer-container{width:90vw;max-width:500px;aspect-ratio:1;position:relative;border-radius:20px;overflow:hidden}
.viewer-container canvas{width:100%!important;height:100%!important;display:block}
.viewer-close{position:absolute;top:16px;right:16px;z-index:10;width:40px;height:40px;background:rgba(0,0,0,0.5);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;cursor:pointer;transition:all 0.2s}
.viewer-close:hover{background:rgba(248,81,73,0.8)}
.viewer-name{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;font-weight:700;letter-spacing:0.05em;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,0.5)}
/* ─── OUTFIT ─── */
.outfit-slots{display:flex;flex-direction:column;gap:8px}
.outfit-slot{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px dashed var(--border);cursor:pointer;transition:all 0.15s}
.outfit-slot:hover{border-color:var(--accent,var(--amber));background:rgba(255,255,255,0.05)}
.outfit-slot.filled{border-style:solid;border-color:var(--accent,var(--amber))}
.outfit-slot-icon{width:40px;height:40px;background:rgba(255,255,255,0.05);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.outfit-slot-info{flex:1}
.outfit-slot-label{font-size:8px;opacity:0.4;letter-spacing:0.1em;text-transform:uppercase}
.outfit-slot-name{font-size:11px;font-weight:600;margin-top:2px}
.outfit-total{display:flex;justify-content:space-between;padding:12px;background:rgba(0,0,0,0.4);border-radius:8px;margin-top:10px}
.outfit-total-price{font-size:18px;font-weight:800;color:var(--accent,var(--amber))}
.outfit-actions{display:flex;gap:8px;margin-top:10px}
.outfit-btn{flex:1;padding:10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit}
.outfit-btn.primary{background:var(--accent,var(--amber));border:none;color:#000}
.outfit-btn.secondary{background:transparent;border:1px solid var(--accent,var(--amber));color:var(--accent,var(--amber))}
.outfit-btn:hover{transform:translateY(-2px)}
/* ─── DROPS ─── */
.drop-item{background:rgba(196,155,61,0.06);border:1px solid rgba(196,155,61,0.15);border-radius:10px;padding:14px;margin-bottom:10px}
.drop-item-name{font-size:12px;font-weight:700;margin-bottom:4px}
.drop-item-date{font-size:9px;opacity:0.5;margin-bottom:8px}
.drop-timer{font-size:18px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums;margin-bottom:8px}
.drop-notify-btn{width:100%;padding:6px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer;background:rgba(196,155,61,0.15);border:1px solid var(--amber);color:var(--amber);font-family:inherit;transition:all 0.15s}
.drop-notify-btn:hover{background:var(--amber);color:#000}
.drop-notify-btn.notified{background:rgba(0,255,157,0.15);color:var(--green);border-color:var(--green)}
/* ─── NOTIFY ─── */
.notif-item{padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border-left:3px solid var(--accent,var(--amber));margin-bottom:8px}
.notif-item.unread{background:rgba(196,155,61,0.05)}
.notif-title{font-size:10px;font-weight:600;margin-bottom:3px}
.notif-text{font-size:9px;opacity:0.5;line-height:1.5}
.notif-time{font-size:8px;opacity:0.3;margin-top:4px}
/* ─── SETTINGS ─── */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.settings-label{font-size:10px}
.toggle{width:40px;height:22px;background:rgba(255,255,255,0.1);border-radius:11px;cursor:pointer;position:relative;transition:background 0.2s}
.toggle.active{background:var(--accent,var(--amber))}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:var(--cream);border-radius:50%;transition:transform 0.2s}
.toggle.active::after{transform:translateX(18px)}
/* ─── TOAST ─── */
.toast{position:fixed;bottom:80px;right:24px;background:rgba(20,20,25,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:99999;transform:translateX(120%);transition:transform 0.35s var(--ease);backdrop-filter:blur(20px);min-width:200px;pointer-events:none}
.toast.show{transform:translateX(0);pointer-events:all}
.toast-icon{font-size:1.1rem}
.toast-title{font-size:11px;font-weight:700}
.toast-text{font-size:9px;opacity:0.5}
/* ─── MUSIC ─── */
.music-art{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:3rem;margin-bottom:12px;position:relative;overflow:hidden}
.music-viz{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end}
.music-bar{width:3px;background:var(--cream);border-radius:2px;animation:mb 0.5s ease-in-out infinite alternate}
@keyframes mb{0%{height:6px}100%{height:22px}}
.music-bar:nth-child(2){animation-delay:0.1s}
.music-bar:nth-child(3){animation-delay:0.2s}
.music-bar:nth-child(4){animation-delay:0.3s}
.music-bar:nth-child(5){animation-delay:0.4s}
.music-info{text-align:center;margin-bottom:10px}
.music-title{font-size:12px;font-weight:700}
.music-artist{font-size:10px;opacity:0.5}
.music-progress{width:100%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:6px;cursor:pointer}
.music-progress-fill{height:100%;background:var(--accent,var(--amber));border-radius:2px;width:35%;transition:width 0.1s}
.music-time{display:flex;justify-content:space-between;font-size:8px;opacity:0.4;margin-bottom:12px}
.music-ctrls{display:flex;align-items:center;justify-content:center;gap:16px}
.music-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:var(--text);font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.music-btn:hover{background:rgba(255,255,255,0.15);transform:scale(1.1)}
.music-btn.play{background:var(--accent,var(--amber));color:var(--midnight);width:44px;height:44px}
.music-btn.play:hover{filter:brightness(1.2)}
/* ─── CHECKOUT ─── */
.co-form{display:flex;flex-direction:column;gap:10px}
.co-field{display:flex;flex-direction:column;gap:4px}
.co-field label{font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.4}
.co-field input,.co-field select,.co-field textarea{padding:10px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;font-family:inherit;outline:none;transition:border-color 0.2s}
.co-field input:focus,.co-field select:focus{border-color:var(--accent,var(--amber))}
.co-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.payment-methods{display:flex;flex-direction:column;gap:6px}
.payment-method{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s}
.payment-method:hover,.payment-method.selected{border-color:var(--amber);background:rgba(196,155,61,0.08)}
.payment-method-icon{font-size:1.2rem}
.payment-method-info{flex:1}
.payment-method-name{font-size:10px;font-weight:600}
.payment-method-desc{font-size:8px;opacity:0.4}
.co-summary{background:rgba(255,255,255,0.03);border-radius:10px;padding:14px;margin-top:10px}
.co-submit{width:100%;padding:14px;background:var(--accent,var(--amber));color:var(--midnight);border:none;border-radius:10px;font-size:12px;font-weight:800;letter-spacing:0.08em;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:10px}
.co-submit:hover{transform:translateY(-2px);box-shadow:0 8px 20px -6px var(--accent,var(--amber))}
/* ─── ADMIN ─── */
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.admin-stat{background:rgba(255,255,255,0.03);border-radius:8px;padding:12px;text-align:center}
.admin-stat-val{font-size:18px;font-weight:800}
.admin-stat-label{font-size:8px;opacity:0.4;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px}
.admin-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:10px;flex-wrap:wrap}
.admin-tab{padding:5px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;border-radius:6px;cursor:pointer;transition:all 0.15s;opacity:0.4}
.admin-tab.active{background:var(--amber);color:var(--midnight);opacity:1}
.admin-tab:hover:not(.active){opacity:0.7}
.admin-panel{display:none}
.admin-panel.active{display:block}
.admin-table{width:100%;font-size:10px;border-collapse:collapse}
.admin-table th{text-align:left;padding:6px 8px;opacity:0.4;font-weight:600;border-bottom:1px solid var(--border);font-size:8px;letter-spacing:0.08em;text-transform:uppercase}
.admin-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
.order-row{padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px;font-size:10px}
.order-id{font-size:10px;font-weight:700;color:var(--amber);margin-bottom:3px}
.order-meta{font-size:9px;opacity:0.5}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.form-group label{font-size:8px;font-weight:700;opacity:0.4;letter-spacing:0.1em;text-transform:uppercase}
.form-input{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:10px;font-family:inherit;outline:none}
.form-input:focus{border-color:var(--amber)}
.btn-admin{padding:8px 16px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:var(--amber);border:none;color:var(--midnight);font-family:inherit;transition:all 0.15s}
.btn-admin:hover{filter:brightness(1.1)}
/* ─── CONTEXT MENU ─── */
.context-menu{position:fixed;background:rgba(15,15,20,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:160px;z-index:10001;display:none;box-shadow:0 20px 40px rgba(0,0,0,0.5)}
.context-menu.show{display:block}
.context-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background 0.1s;font-size:10px}
.context-item:hover{background:rgba(255,255,255,0.08)}
.context-sep{height:1px;background:var(--border);margin:4px 0}
/* ─── WISHLIST ─── */
.wishlist-item{display:flex;align-items:center;gap:10px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px}
.wishlist-item-icon{font-size:1.2rem}
.wishlist-item-name{font-size:10px;font-weight:600;flex:1}
.wishlist-item-price{font-size:9px;color:var(--accent,var(--amber))}
.wishlist-item-remove{opacity:0.3;cursor:pointer;font-size:10px}
.wishlist-item-remove:hover{opacity:1;color:#F85149}
/* ─── SIZE GUIDE ─── */
.size-table{width:100%;font-size:9px;border-collapse:collapse}
.size-table th{text-align:left;padding:6px 0;opacity:0.4;font-weight:600;border-bottom:1px solid var(--border);font-size:8px;letter-spacing:0.05em}
.size-table td{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
/* ─── RESPONSIVE ─── */
@media(max-width:768px){
.hero-section{padding:60px 24px 0;min-height:92vh}
.hero-visual{display:none}
.hero-title{font-size:clamp(2rem,10vw,3rem)}
.hero-sub{font-size:clamp(1rem,4vw,1.4rem)}
.hero-desc{font-size:0.85rem}
.dock{padding:4px 10px;gap:3px;border-radius:14px;bottom:10px}
.dock-item{width:40px;height:40px;font-size:17px;border-radius:10px}
.dock-item:hover::after{display:none}
.dock-item .badge{width:14px;height:14px;font-size:7px}
.dock-sep{height:28px;margin:0 2px}
.statusbar{height:28px;font-size:9px;padding:0 10px}
.window{min-width:94vw!important;max-width:97vw!important;left:1.5vw!important;top:40px!important;transform:none!important}
.window.max{top:28px!important;height:calc(100vh - 28px)!important}
.win-content{padding:12px}
.products-grid{grid-template-columns:repeat(2,1fr);gap:8px}
.product-img{font-size:1.8rem}
.product-name{font-size:10px}
.product-price{font-size:12px}
.product-btn{font-size:8px;padding:5px}
.btn-primary,.btn-secondary{padding:12px 24px;font-size:0.72rem}
.toast{left:12px;right:12px;bottom:70px;min-width:auto}
.load-logo{font-size:3rem}
.load-ring{width:44px;height:44px}
.section{padding:60px 24px}
.collections-showcase{grid-template-columns:1fr;gap:14px}
.collection-card{aspect-ratio:3/4;border-radius:16px}
.manifesto-grid{grid-template-columns:1fr;gap:40px}
.manifesto-section{padding:60px 24px}
.manifesto-quote{font-size:clamp(1.4rem,7vw,2rem)}
.manifesto-stats{justify-content:center}
.features-grid{grid-template-columns:1fr;gap:14px}
.feature-card{padding:24px;border-radius:16px}
.shipping-steps{grid-template-columns:1fr;gap:24px}
.shipping-step::after{display:none}
.newsletter-section{padding:60px 24px}
.newsletter-form{flex-direction:column}
footer{padding:40px 24px 24px}
.footer-grid{grid-template-columns:1fr;gap:32px}
.footer-bottom{flex-direction:column;text-align:center}
.collection-content{padding:20px}
.collection-name{font-size:0.95rem}
.collection-count-badge{top:12px;right:12px;padding:4px 10px;font-size:0.55rem}
.hero-eyebrow{font-size:0.58rem;padding:5px 10px;margin-bottom:24px;gap:6px}
.checkout-body{grid-template-columns:1fr;padding:20px}
.checkout-header{padding:20px}
.checkout-row{grid-template-columns:1fr}
.checkout-payment{grid-template-columns:1fr 1fr}
.cart-panel{width:100%}
.product-modal{grid-template-columns:1fr}
.product-modal-img{min-height:200px;border-radius:24px 24px 0 0}
.whatsapp-fab{bottom:80px;right:16px;width:48px;height:48px;font-size:1.2rem}
.ai-stylist-fab{bottom:140px;right:16px;width:48px;height:48px;font-size:1.1rem}
}
@media(max-width:400px){
html{font-size:14px}
.products-grid{grid-template-columns:1fr}
.dock-item{width:36px;height:36px;font-size:15px}
.dock{padding:4px 8px;gap:2px}
.hero-section{padding:40px 16px 0}
.hero-title{font-size:clamp(1.8rem,12vw,2.8rem)}
.hero-sub{font-size:clamp(0.85rem,5vw,1.2rem)}
.hero-desc{font-size:0.78rem;margin-bottom:24px}
.section{padding:40px 16px}
.section-title{font-size:clamp(1.4rem,8vw,1.8rem)}
.section-desc{font-size:0.82rem;margin-bottom:32px}
.collections-showcase{gap:10px}
.features-grid{gap:10px}
.feature-card{padding:18px;border-radius:14px}
.feature-icon{font-size:1.8rem;margin-bottom:12px}
.feature-title{font-size:0.85rem}
.feature-desc{font-size:0.72rem}
.shipping-step{padding:20px 12px}
.shipping-icon{font-size:2.2rem}

footer{padding:32px 16px 20px}
.whatsapp-fab{bottom:70px;width:44px;height:44px;font-size:1.1rem}
.ai-stylist-fab{bottom:125px;width:44px;height:44px;font-size:1rem}
.btn-primary,.btn-secondary{padding:10px 20px;font-size:0.68rem}
}
/* ─── SCROLLBAR ─── */
@media(max-width:768px){
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.12) transparent}
}
/* ─── SAFE AREA ─── */
@supports(padding-bottom:env(safe-area-inset-bottom)){
.dock{padding-bottom:calc(6px + env(safe-area-inset-bottom))}
.statusbar{padding-left:calc(18px + env(safe-area-inset-left));padding-right:calc(18px + env(safe-area-inset-right))}
.toast{bottom:calc(80px + env(safe-area-inset-bottom))}
}
/* ─── TOUCH ─── */
@media(max-width:768px){
button,.dock-item,.product-card,.collection-item,.filter-tag,.outfit-btn,.music-btn{-webkit-tap-highlight-color:rgba(255,255,255,0.08)}
button:active,.dock-item:active,.product-card:active{opacity:0.7;transform:scale(0.97)}
.win-content,.stylist-msgs,.cart-items{-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
}
/* ─── COMMAND PALETTE ─── */
.cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99998;display:none;align-items:flex-start;justify-content:center;padding-top:120px}
.cmd-overlay.open{display:flex}
.cmd-palette{width:460px;max-width:90vw;background:rgba(15,15,20,0.97);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.6);backdrop-filter:blur(30px)}
.cmd-search{width:100%;padding:14px 16px;background:rgba(0,0,0,0.4);border:none;color:var(--text);font-size:14px;font-family:inherit;outline:none;border-bottom:1px solid var(--border)}
.cmd-search::placeholder{opacity:0.3}
.cmd-list{max-height:280px;overflow-y:auto;padding:6px}
.cmd-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;transition:background 0.1s;font-size:12px}
.cmd-item:hover{background:rgba(255,255,255,0.06)}
.cmd-item .cmd-icon{font-size:16px;width:24px;text-align:center}
.cmd-item .cmd-label{flex:1}
.cmd-item .cmd-key{font-size:8px;opacity:0.35;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:3px}
/* ─── MARQUEE ─── */
.marquee-section{overflow:hidden;padding:20px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(26,34,53,0.3)}
.marquee{display:flex;animation:marquee-scroll 35s linear infinite}
.marquee-item{font-size:0.65rem;font-weight:800;letter-spacing:0.4em;text-transform:uppercase;color:var(--subtext);white-space:nowrap;padding:0 48px;opacity:0.4;display:flex;align-items:center;gap:24px}
.marquee-item span{color:var(--amber);font-size:0.45rem}
@keyframes marquee-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* ─── SECTIONS ─── */
.section{padding:100px 60px}
.section-label{font-size:0.6rem;font-weight:700;letter-spacing:0.35em;text-transform:uppercase;color:var(--amber);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-label::before{content:'';width:24px;height:1px;background:var(--amber)}
.section-title{font-size:clamp(2rem,4vw,3rem);font-weight:900;line-height:1.1;color:var(--cream);margin-bottom:16px;letter-spacing:-0.02em}
.section-desc{font-size:0.9rem;color:var(--subtext);max-width:520px;line-height:1.8;margin-bottom:48px}
.fade-up{opacity:0;transform:translateY(50px);transition:opacity 0.8s ease,transform 0.8s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
/* ─── COLLECTIONS SHOWCASE ─── */
.collections-showcase{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.collection-card{position:relative;border-radius:20px;overflow:hidden;cursor:pointer;aspect-ratio:3/4.5;background:var(--raven);border:1px solid var(--border);transition:all 0.4s}
.collection-card:hover{transform:translateY(-8px);border-color:rgba(196,155,61,0.2);box-shadow:0 30px 60px rgba(0,0,0,0.5)}
.collection-card-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0.08;transition:opacity 0.4s;font-size:8rem}
.collection-card:hover .collection-card-bg{opacity:0.18}
.collection-card::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,15,30,0.95) 0%,rgba(10,15,30,0.3) 50%,transparent 100%);z-index:1}
.collection-content{position:absolute;bottom:0;left:0;right:0;padding:28px;z-index:2}
.collection-name{font-size:1.1rem;font-weight:800;color:var(--cream);margin-bottom:4px}
.collection-sub{font-size:0.65rem;color:var(--subtext);letter-spacing:0.12em;text-transform:uppercase}
.collection-count-badge{position:absolute;top:20px;right:20px;padding:6px 12px;background:rgba(196,155,61,0.15);border:1px solid rgba(196,155,61,0.3);border-radius:20px;font-size:0.6rem;font-weight:700;color:var(--amber);z-index:2}
/* ─── MANIFESTO ─── */
.manifesto-section{background:var(--raven);position:relative;overflow:hidden;padding:100px 60px}
.manifesto-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(196,155,61,0.06) 0%,transparent 50%)}
.manifesto-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.manifesto-quote{font-size:clamp(1.8rem,4vw,3.5rem);font-weight:900;line-height:1.1;color:var(--cream);letter-spacing:-0.02em;margin-bottom:16px}
.manifesto-quote span{color:var(--amber)}
.manifesto-text{font-size:0.95rem;line-height:1.9;color:var(--subtext);margin-bottom:32px}
.manifesto-stats{display:flex;gap:40px}
.manifesto-stat{text-align:center}
.manifesto-stat-num{font-size:2rem;font-weight:900;color:var(--amber)}
.manifesto-stat-label{font-size:0.65rem;color:var(--subtext);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px}
/* ─── FEATURES ─── */
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.feature-card{padding:32px;background:var(--raven);border:1px solid var(--border);border-radius:20px;transition:all 0.3s}
.feature-card:hover{transform:translateY(-6px);border-color:rgba(196,155,61,0.2);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.feature-icon{font-size:2.2rem;margin-bottom:16px}
.feature-title{font-size:0.95rem;font-weight:700;color:var(--cream);margin-bottom:8px}
.feature-desc{font-size:0.8rem;color:var(--subtext);line-height:1.6}
/* ─── SHIPPING ─── */
.shipping-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:40px}
.shipping-step{text-align:center;padding:32px;position:relative}
.shipping-step::after{content:'→';position:absolute;right:-20px;top:50%;transform:translateY(-50%);font-size:1.5rem;color:var(--amber);opacity:0.5}
.shipping-step:last-child::after{display:none}
.shipping-icon{font-size:2.8rem;margin-bottom:16px}
.shipping-title{font-size:0.95rem;font-weight:700;color:var(--cream);margin-bottom:8px}
.shipping-desc{font-size:0.78rem;color:var(--subtext);line-height:1.6}
/* ─── NEWSLETTER ─── */
.newsletter-section{text-align:center;padding:100px 60px;background:linear-gradient(180deg,transparent,rgba(26,34,53,0.3))}
.newsletter-box{max-width:500px;margin:0 auto}
.newsletter-form{display:flex;gap:12px;margin-top:28px}
.newsletter-input{flex:1;padding:14px 20px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;color:var(--cream);font-size:0.85rem;font-family:inherit;outline:none;transition:all 0.2s}
.newsletter-input:focus{border-color:var(--amber);background:rgba(196,155,61,0.03)}
.newsletter-input::placeholder{color:rgba(255,255,255,0.25)}
.newsletter-btn{padding:14px 32px;background:var(--amber);color:var(--midnight);font-size:0.78rem;font-weight:800;letter-spacing:0.08em;border:none;border-radius:12px;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.newsletter-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,155,61,0.4)}
.newsletter-success{display:none;color:var(--amber);font-size:0.85rem;font-weight:600;margin-top:16px}
.newsletter-success.show{display:block;animation:fade-in 0.5s ease}
/* ─── FOOTER ─── */
footer{padding:80px 60px 40px;border-top:1px solid var(--border)}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:60px;margin-bottom:60px}
.footer-tagline{font-size:0.82rem;color:var(--subtext);line-height:1.7;max-width:300px;margin-top:16px}
.footer-col-title{font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--amber);margin-bottom:20px}
.footer-links{display:flex;flex-direction:column;gap:12px}
.footer-links a{font-size:0.82rem;color:var(--subtext);text-decoration:none;transition:color 0.2s}
.footer-links a:hover{color:var(--cream)}
.footer-contact-item{font-size:0.82rem;color:var(--subtext);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.footer-social{display:flex;gap:12px;margin-top:12px}
.footer-social a{width:40px;height:40px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--subtext);text-decoration:none;transition:all 0.2s}
.footer-social a:hover{background:var(--amber);color:var(--midnight);border-color:var(--amber);transform:translateY(-3px)}
.footer-bottom{padding-top:40px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-copy{font-size:0.72rem;color:var(--subtext)}
.footer-payments{display:flex;gap:8px;align-items:center}
.footer-payments span{font-size:0.72rem;color:var(--subtext)}
.payment-badge{padding:6px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;font-size:0.65rem;font-weight:600;color:var(--subtext)}
/* ─── WHATSAPP FAB ─── */
.whatsapp-fab{position:fixed;bottom:100px;right:30px;width:56px;height:56px;background:#25D366;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:999;transition:all 0.3s;box-shadow:0 6px 24px rgba(37,211,102,0.4);text-decoration:none;font-size:1.5rem}
.whatsapp-fab:hover{transform:scale(1.1);box-shadow:0 8px 32px rgba(37,211,102,0.6)}
/* ─── STYLIST QUIZ ─── */
.stylist-quiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px);padding:20px}
.stylist-quiz-overlay.show{display:flex}
.stylist-quiz-modal{background:var(--raven);border:1px solid var(--border);border-radius:24px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto;animation:modal-in 0.3s ease;padding:36px;position:relative}
.stylist-quiz-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,0.05);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--subtext);font-size:1rem;transition:all 0.15s;z-index:2}
.stylist-quiz-close:hover{background:rgba(248,81,73,0.15);color:#F85149}
.stylist-quiz-steps{display:flex;gap:6px;margin-bottom:28px;justify-content:center}
.stylist-quiz-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.3s}
.stylist-quiz-dot.active{background:var(--amber);transform:scale(1.4)}
.stylist-quiz-dot.done{background:var(--sky)}
.stylist-quiz-screen{display:none}
.stylist-quiz-screen.active{display:block;animation:fade-in 0.3s ease}
.stylist-quiz-title{font-size:1.3rem;font-weight:900;color:var(--cream);margin-bottom:8px;letter-spacing:-0.02em}
.stylist-quiz-sub{font-size:0.82rem;color:var(--subtext);line-height:1.7;margin-bottom:24px}
.stylist-quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.stylist-quiz-option{display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all 0.2s;font-family:inherit;color:var(--text);text-align:center}
.stylist-quiz-option:hover{border-color:rgba(196,155,61,0.3);background:rgba(196,155,61,0.05)}
.stylist-quiz-option.selected{border-color:var(--amber);background:rgba(196,155,61,0.1)}
.stylist-quiz-option-icon{font-size:1.8rem}
.stylist-quiz-option-label{font-size:0.8rem;font-weight:600;color:var(--cream)}
.stylist-quiz-option-desc{font-size:0.65rem;color:var(--subtext)}
.stylist-quiz-nav{display:flex;gap:12px;justify-content:space-between}
.stylist-quiz-btn{padding:12px 28px;border-radius:12px;font-size:0.75rem;font-weight:700;letter-spacing:0.06em;cursor:pointer;border:none;transition:all 0.2s;font-family:inherit}
.stylist-quiz-btn-primary{background:linear-gradient(135deg,var(--amber),var(--sky));color:var(--midnight)}
.stylist-quiz-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,155,61,0.3)}
.stylist-quiz-btn-secondary{background:rgba(255,255,255,0.04);color:var(--subtext);border:1px solid var(--border)}
.stylist-quiz-btn-secondary:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.stylist-quiz-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none!important}
.stylist-quiz-results{text-align:center}
.stylist-quiz-recs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0}
.stylist-quiz-tip{background:rgba(123,163,201,0.08);border:1px solid rgba(123,163,201,0.2);border-radius:14px;padding:14px 18px;margin-top:14px;text-align:left;display:flex;gap:10px;align-items:flex-start}
.stylist-quiz-tip-icon{font-size:1.1rem;flex-shrink:0}
.stylist-quiz-tip-text{font-size:0.78rem;color:var(--text);line-height:1.6}
.stylist-quiz-tip-text strong{color:var(--sky)}
.stylist-quiz-actions{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.stylist-quiz-badge{display:inline-block;padding:4px 12px;background:linear-gradient(135deg,var(--amber),var(--sky));border-radius:20px;font-size:0.6rem;font-weight:700;color:var(--midnight);margin-bottom:12px}
/* ─── CHECKOUT MODAL ─── */
.checkout-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px);padding:20px}
.checkout-overlay.show{display:flex}
.checkout-modal{background:var(--raven);border:1px solid var(--border);border-radius:24px;width:680px;max-width:100%;max-height:92vh;overflow-y:auto;animation:modal-in 0.3s ease;position:relative}
.checkout-modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,0.05);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--subtext);font-size:1rem;z-index:2;transition:all 0.15s}
.checkout-modal-close:hover{background:rgba(248,81,73,0.15);color:#F85149}
.checkout-header{padding:28px 32px 20px;border-bottom:1px solid var(--border)}
.checkout-title{font-size:1.2rem;font-weight:900;color:var(--cream);letter-spacing:-0.02em}
.checkout-sub{font-size:0.72rem;color:var(--subtext);margin-top:4px}
.checkout-body{padding:24px 32px;display:grid;grid-template-columns:1.4fr 1fr;gap:32px}
.checkout-left{display:flex;flex-direction:column;gap:20px}
.checkout-right{display:flex;flex-direction:column;gap:16px}
.checkout-field{display:flex;flex-direction:column;gap:6px}
.checkout-field label{font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--subtext)}
.checkout-field input,.checkout-field select,.checkout-field textarea{padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--cream);font-size:0.82rem;font-family:inherit;outline:none;transition:border-color 0.2s}
.checkout-field input:focus,.checkout-field select:focus,.checkout-field textarea:focus{border-color:var(--amber)}
.checkout-field select option{background:var(--raven);color:var(--cream)}
.checkout-field textarea{resize:vertical;min-height:60px}
.checkout-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.checkout-payment{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.checkout-pay-opt{padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all 0.15s;font-size:0.75rem;font-weight:600;color:var(--subtext);font-family:inherit}
.checkout-pay-opt:hover{border-color:rgba(196,155,61,0.3);color:var(--text)}
.checkout-pay-opt.selected{border-color:var(--amber);background:rgba(196,155,61,0.1);color:var(--amber)}
.checkout-pay-opt .pay-icon{font-size:1.1rem;display:block;margin-bottom:4px}
.checkout-summary-card{background:rgba(255,255,255,0.03);border-radius:12px;padding:16px}
.checkout-summary-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.78rem}
.checkout-summary-item:last-child{border-bottom:none}
.checkout-summary-name{color:var(--cream);flex:1}
.checkout-summary-qty{color:var(--subtext);margin:0 8px}
.checkout-summary-price{color:var(--amber);font-weight:700}
.checkout-summary-total{padding:12px 0 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:1rem;font-weight:800;color:var(--cream);margin-top:8px}
.checkout-summary-total .val{color:var(--amber)}
.checkout-summary-shipping{font-size:0.72rem;color:var(--subtext);display:flex;justify-content:space-between;padding:4px 0}
.checkout-submit{width:100%;padding:16px;background:var(--amber);color:var(--midnight);border:none;border-radius:12px;font-size:0.85rem;font-weight:800;letter-spacing:0.08em;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:8px}
.checkout-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,155,61,0.4)}
.checkout-submit:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.checkout-submit.loading{position:relative;color:transparent}
.checkout-submit.loading::after{content:'';position:absolute;width:20px;height:20px;border:2px solid var(--midnight);border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;top:50%;left:50%;margin:-10px}
.checkout-confirm{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center}
.checkout-confirm.show{display:flex}
.checkout-confirm-icon{font-size:3rem;margin-bottom:16px}
.checkout-confirm-title{font-size:1.2rem;font-weight:900;color:var(--cream);margin-bottom:8px}
.checkout-confirm-sub{font-size:0.82rem;color:var(--subtext);line-height:1.6;margin-bottom:16px}
.checkout-tracking{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:rgba(196,155,61,0.1);border:1px solid rgba(196,155,61,0.3);border-radius:12px;font-size:1rem;font-weight:800;color:var(--amber);letter-spacing:0.15em;margin-bottom:16px}
.checkout-confirm-btn{padding:14px 36px;background:var(--amber);color:var(--midnight);border:none;border-radius:12px;font-size:0.82rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s}
.checkout-confirm-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,155,61,0.4)}
/* ─── CART PANEL ─── */
.cart-panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99998;display:none;justify-content:flex-end;backdrop-filter:blur(4px)}
.cart-panel-overlay.show{display:flex}
.cart-panel{width:420px;max-width:100%;background:var(--raven);border-left:1px solid var(--border);height:100%;display:flex;flex-direction:column;animation:slide-in 0.3s ease}
@keyframes slide-in{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cart-panel-header{display:flex;align-items:center;justify-content:space-between;padding:24px;border-bottom:1px solid var(--border);flex-shrink:0}
.cart-panel-title{font-size:1.1rem;font-weight:800;color:var(--cream)}
.cart-panel-close{width:36px;height:36px;background:rgba(255,255,255,0.05);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--subtext);font-size:1rem;transition:all 0.15s}
.cart-panel-close:hover{background:rgba(248,81,73,0.15);color:#F85149}
.cart-panel-items{flex:1;overflow-y:auto;padding:16px 24px}
.cart-panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--subtext);gap:12px}
.cart-panel-empty-icon{font-size:3rem}
.cart-panel-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.cart-panel-item-icon{width:56px;height:56px;background:rgba(255,255,255,0.04);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.cart-panel-item-info{flex:1}
.cart-panel-item-name{font-size:0.82rem;font-weight:700;color:var(--cream)}
.cart-panel-item-meta{font-size:0.7rem;color:var(--subtext);margin-top:2px}
.cart-panel-item-price{font-size:0.82rem;font-weight:700;color:var(--amber);margin-top:4px}
.cart-panel-item-actions{display:flex;align-items:center;gap:8px;margin-top:6px}
.cart-panel-qty-btn{width:28px;height:28px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:0.78rem;transition:all 0.1s;font-family:inherit}
.cart-panel-qty-btn:hover{background:rgba(255,255,255,0.08)}
.cart-panel-qty{font-size:0.78rem;font-weight:700;color:var(--cream);min-width:24px;text-align:center}
.cart-panel-footer{padding:20px 24px;border-top:1px solid var(--border);flex-shrink:0}
.cart-panel-total-row{display:flex;justify-content:space-between;margin-bottom:6px}
.cart-panel-total-label{font-size:0.78rem;color:var(--subtext)}
.cart-panel-total-value{font-size:0.82rem;font-weight:700;color:var(--cream)}
.cart-panel-total-grand{font-size:1.1rem;font-weight:900;color:var(--amber)}
.cart-panel-checkout-btn{width:100%;padding:14px;background:var(--amber);color:var(--midnight);border:none;border-radius:12px;font-size:0.82rem;font-weight:800;letter-spacing:0.08em;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:12px}
.cart-panel-checkout-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,155,61,0.4)}
.cart-panel-remove-btn{font-size:0.68rem;color:var(--subtext);cursor:pointer;margin-left:8px;text-decoration:underline;background:none;border:none;font-family:inherit}
.cart-panel-remove-btn:hover{color:#F85149}
/* ─── PRODUCT MODAL ─── */
.product-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:99999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);padding:20px}
.product-modal-overlay.show{display:flex}
.product-modal{background:var(--raven);border:1px solid var(--border);border-radius:24px;width:720px;max-width:100%;max-height:90vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:0;animation:modal-in 0.3s ease}
@keyframes modal-in{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.product-modal-img{min-height:400px;display:flex;align-items:center;justify-content:center;font-size:6rem;background:linear-gradient(135deg,rgba(255,255,255,0.02),rgba(255,255,255,0.06));border-radius:24px 0 0 24px;position:relative;overflow:hidden}
.product-modal-body{padding:32px;display:flex;flex-direction:column;gap:16px}
.product-modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(0,0,0,0.5);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:1rem;transition:all 0.2s;z-index:2}
.product-modal-close:hover{background:rgba(248,81,73,0.8)}
.product-modal-collection{font-size:0.58rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--sky)}
.product-modal-name{font-size:1.4rem;font-weight:800;color:var(--cream);line-height:1.2}
.product-modal-owner{font-size:0.78rem;color:var(--subtext)}
.product-modal-price-row{display:flex;align-items:baseline;gap:12px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.product-modal-price{font-size:1.5rem;font-weight:900;color:var(--amber)}
.product-modal-old{font-size:0.95rem;color:var(--subtext);text-decoration:line-through}
.product-modal-desc{font-size:0.82rem;color:var(--text);line-height:1.7}
.product-modal-sizes{margin-top:4px}
.product-modal-sizes-label{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--subtext);margin-bottom:8px}
.product-modal-size-options{display:flex;gap:8px;flex-wrap:wrap}
.product-modal-size-btn{width:42px;height:42px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;font-family:inherit}
.product-modal-size-btn:hover{border-color:var(--amber);color:var(--amber)}
.product-modal-size-btn.selected{background:var(--amber);color:var(--midnight);border-color:var(--amber)}
.product-modal-stock{font-size:0.72rem;color:var(--subtext)}
.product-modal-stock.low{color:var(--sunset)}
.product-modal-stock.out{color:#F85149}
.product-modal-add-btn{width:100%;padding:14px;background:var(--amber);color:var(--midnight);border:none;border-radius:12px;font-size:0.82rem;font-weight:800;letter-spacing:0.08em;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:auto}
.product-modal-add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,155,61,0.4)}
/* ─── AI STYLIST FAB ─── */
.ai-stylist-fab{position:fixed;bottom:170px;right:30px;width:56px;height:56px;background:linear-gradient(135deg,var(--amber),var(--sky));color:var(--midnight);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:999;transition:all 0.3s;box-shadow:0 6px 24px rgba(196,155,61,0.4);text-decoration:none;font-size:1.4rem;cursor:pointer;border:none;font-weight:900}
.ai-stylist-fab:hover{transform:scale(1.1) rotate(-10deg);box-shadow:0 8px 32px rgba(196,155,61,0.6)}
.ai-fab-pulse{position:absolute;inset:0;border-radius:50%;border:2px solid var(--amber);animation:ai-pulse 2s ease infinite}
@keyframes ai-pulse{0%{transform:scale(1);opacity:0.6}100%{transform:scale(1.5);opacity:0}}
/* ─── RESPONSIVE ─── */
@media(max-width:1024px){
.collections-showcase{grid-template-columns:repeat(2,1fr)}
.features-grid{grid-template-columns:repeat(2,1fr)}
.footer-grid{grid-template-columns:1fr 1fr;gap:40px}
.product-modal{grid-template-columns:1fr}
.product-modal-img{min-height:200px;border-radius:24px 24px 0 0}
}

// ─── PERSISTENCE ───
function loadData(){
  try{
    const s=localStorage.getItem(PRODS_KEY);
    products=s?JSON.parse(s):DEFAULT_PRODS.map(p=>({...p}));
    if(!s)localStorage.setItem(PRODS_KEY,JSON.stringify(products));
    cart=JSON.parse(localStorage.getItem(CART_KEY)||'[]');
    orders=JSON.parse(localStorage.getItem(ORDERS_KEY)||'[]');
    wishlist=JSON.parse(localStorage.getItem('flyra_wishlist')||'[]');
    notifiedDrops=JSON.parse(localStorage.getItem('flyra_ndrops')||'[]');
  }catch(e){products=DEFAULT_PRODS.map(p=>({...p}))}
}
function saveProducts(){localStorage.setItem(PRODS_KEY,JSON.stringify(products))}
function saveCart(){localStorage.setItem(CART_KEY,JSON.stringify(cart))}
function saveOrders(){localStorage.setItem(ORDERS_KEY,JSON.stringify(orders))}
function saveWishlist(){localStorage.setItem('flyra_wishlist',JSON.stringify(wishlist))}
function saveNDrops(){localStorage.setItem('flyra_ndrops',JSON.stringify(notifiedDrops))}

  lang=l;

// ─── WINDOW MANAGEMENT ───
function focusWindow(id){
  const win=document.getElementById('win-'+id);
  if(!win)return;
  win.style.display='flex';
  win.classList.remove('min');
  document.querySelectorAll('.window').forEach(w=>w.classList.remove('focused'));
  win.classList.add('focused');
  const docks=document.querySelectorAll('.dock-item');
  const idx=['welcome','products','collections','cart','stylist','outfit','drops','music','notifications','settings'].indexOf(id);
  docks.forEach((d,i)=>{d.classList.toggle('active',i===idx||(i===1&&id==='products'))});
  if(id==='cart')renderCart();
  if(id==='drops')renderDrops();
  if(id==='notifications')renderNotifications();
}
window.focusWindow=focusWindow;

function hideWindow(id){
  const win=document.getElementById('win-'+id);
  if(win)win.style.display='none';
}
window.hideWindow=hideWindow;

function minWindow(id){
  const win=document.getElementById('win-'+id);
  if(win)win.classList.toggle('min');
}
window.minWindow=minWindow;

function maxWindow(id){
  const win=document.getElementById('win-'+id);
  if(win){
    if(win.classList.contains('max')){win.classList.remove('max')}
    else{win.classList.add('max');document.querySelectorAll('.window').forEach(w=>w.classList.remove('focused'));win.classList.add('focused')}
  }
}
window.maxWindow=maxWindow;

// ─── PRODUCTS ───
function renderProducts(){
  const grid=document.getElementById('product-grid');
  if(!grid)return;
  let filtered = products.filter(p=>p.status!=='drop');
  if(currentColl!=='all')filtered=filtered.filter(p=>p.coll===currentColl);
  if(searchQ)filtered=filtered.filter(p=>p.name.toLowerCase().includes(searchQ)||p.desc.toLowerCase().includes(searchQ));
  if(activeTag)filtered=filtered.filter(p=>p.tag===activeTag);
  if(activeStatus)filtered=filtered.filter(p=>p.status===activeStatus);

  if(filtered.length===0){
    grid.innerHTML='<p style="opacity:0.3;font-size:12px;text-align:center;padding:30px;grid-column:1/-1">No results found</p>';
    return;
  }
  updateShowcaseCounts();
  grid.innerHTML=filtered.map(p=>{
    const sold=p.status==='soldout'||p.stock===0;
    const lim=p.status==='limited'||(p.stock>0&&p.stock<=5);
    const tag=sold?'<span class="product-tag">SOLD OUT</span>':lim?'<span class="product-tag" style="background:var(--sunset)">LIMITED</span>':p.tag?`<span class="product-tag">${p.tag}</span>`:'';
    const st=sold?'<span class="stock-badge out">Out of stock</span>':lim?`<span class="stock-badge low">⚠ ${p.stock} left</span>`:p.stock>0?`<span class="stock-badge">${p.stock} in stock</span>`:'';
    return `<div class="product-card${sold?' sold-out':''}" data-id="${p.id}" oncontextmenu="showContext(event,${p.id})" onclick="openProduct(${p.id})">
      ${tag}
      <div class="product-img"><span style="font-size:2.2rem">${p.icon||'📦'}</span></div>
      <div class="product-name">${p.name}</div>
      <div class="product-desc">${p.desc}</div>
      ${st}
      <div class="product-price-row" style="display:flex;align-items:baseline;gap:6px">
        <span class="product-price">${fmt(p.price)}</span>
        ${p.oldPrice?`<span class="product-old-price">${fmt(p.oldPrice)}</span>`:''}
      </div>
      <div class="product-actions">
        <button class="product-btn" onclick="event.stopPropagation();addToOutfit(${p.id})">+ Look</button>
        <button class="product-btn primary" onclick="event.stopPropagation();addToCart(${p.id})"${sold?' disabled':''}>${sold?'SOLD':t('addToCart')}</button>
      </div>
    </div>`;
  }).join('');
  updateCollectionCounts();
}

// ─── CART ───
function addToCart(id){
  const p=products.find(x=>x.id===id);
  if(!p||p.stock===0||p.status==='soldout'){toast('⚠','Out of stock');return}
  const idx=products.findIndex(x=>x.id===id);
  if(idx!==-1&&products[idx].stock>0){products[idx].stock--;if(products[idx].stock===0)products[idx].status='soldout';saveProducts()}
  const cid=Date.now();
  cart.push({...p,cartId:cid,size:(p.sizes&&p.sizes[0])||'M'});
  saveCart();
  renderCart();
  toast('✓ '+t('addToCart'),p.name);
}
window.addToCart=addToCart;

function removeFromCart(i){
  const item=cart[i];
  if(!item)return;
  const pi=products.findIndex(x=>x.id===item.id);
  if(pi!==-1){products[pi].stock++;if(products[pi].status==='soldout')products[pi].status='active';saveProducts()}
  cart.splice(i,1);
  saveCart();
  renderCart();
}
window.removeFromCart=removeFromCart;

function renderCart(){
  const content=document.getElementById('cart-content');
  const badge=document.getElementById('cart-badge');
  if(badge)badge.textContent=cart.length;
  if(!content)return;
  if(cart.length===0){content.innerHTML='<div class="cart-empty">Cart is empty</div>';return}
  const sub=cart.reduce((s,i)=>s+i.price,0);
  const ship=800;
  content.innerHTML=`
    <div class="w-label">Your selection (${cart.length})</div>
    <div class="cart-items">${cart.map((item,i)=>
      `<div class="cart-item"><div class="cart-item-img">${item.icon||'📦'}</div><div class="cart-item-info"><div class="cart-item-name">${item.name}</div><div class="cart-item-meta">SIZE: ${item.size}</div></div><div class="cart-item-price">${fmt(item.price)}</div><div class="cart-item-remove" onclick="removeFromCart(${i})">✕</div></div>`
    ).join('')}</div>
    <div class="cart-total"><div class="cart-row"><span>Subtotal</span><span>${fmt(sub)}</span></div><div class="cart-row"><span>Shipping</span><span>${fmt(ship)}</span></div><div class="cart-row total"><span>${t('total')}</span><span>${fmt(sub+ship)}</span></div></div>
      <button class="cart-checkout-btn" onclick="openCheckoutModal()">${t('checkout')} →</button>`;
  updateStats();
  try{renderCartPanel()}catch(e){}
}
window.renderCart=renderCart;

// ─── CHECKOUT ───
function openCheckout(){
  if(cart.length===0){toast('⚠','Cart is empty');return}
  const fname=prompt(t('checkout')+'\n'+'First Name:');
  if(!fname)return;
  const phone=prompt('Phone Number:');
  if(!phone)return;
  const wilaya=prompt('Wilaya:');
  if(!wilaya)return;
  const address=prompt('Delivery Address:');
  if(!address)return;
  const sub=cart.reduce((s,i)=>s+i.price,0);
  const orderId='FLY'+Date.now().toString().slice(-6);
  const order={id:orderId,customer:{name:fname,phone,wilaya,address},items:[...cart],subtotal:sub,shipping:800,total:sub+800,payment:'cod',date:new Date().toISOString(),status:'pending'};
  orders.unshift(order);
  saveOrders();
  cart=[];
  saveCart();
  renderCart();
  updateStats();
  toast('✅ '+t('checkout'),'Order #'+orderId+' confirmed!');
  addNotification('ORDER PLACED','#'+orderId+' — '+fmt(sub+800));
}
window.openCheckout=openCheckout;

// ─── OUTFIT ───
function addToOutfit(id){
  const p=products.find(x=>x.id===id);
  if(!p)return;
  const slots=['top','bottom','shoes','accessory'];
  for(let s of slots){if(!outfit[s]){outfit[s]=p;renderOutfit();toast('+ Outfit',p.name+' → '+s.toUpperCase());return}}
  toast('Outfit Full','Remove an item first');
}
window.addToOutfit=addToOutfit;

function pickOutfitSlot(slot){
  const items=products.filter(p=>p.status!=='drop');
  const names=items.map((p,i)=>`${i+1}. ${p.icon||'📦'} ${p.name} — ${fmt(p.price)}`).join('\n');
  const choice=prompt(`Select item for ${slot.toUpperCase()}:\n\n${names}\n\nEnter number:`);
  if(!choice)return;
  const idx=parseInt(choice)-1;
  if(idx>=0&&idx<items.length){outfit[slot]=items[idx];renderOutfit();toast('✓',items[idx].name+' → '+slot.toUpperCase())}
}
window.pickOutfitSlot=pickOutfitSlot;

function renderOutfit(){
  document.querySelectorAll('.outfit-slot').forEach(slot=>{
    const key=slot.dataset.slot;
    const item=outfit[key];
    const nameEl=slot.querySelector('.outfit-slot-name');
    const iconEl=slot.querySelector('.outfit-slot-icon');
    if(item){if(nameEl)nameEl.textContent=item.name;if(iconEl)iconEl.textContent=item.icon||'📦';slot.classList.add('filled')}
    else{if(nameEl)nameEl.textContent='Select item...';slot.classList.remove('filled')}
  });
  const total=Object.values(outfit).filter(Boolean).reduce((s,p)=>s+p.price,0);
  const el=document.getElementById('outfit-total');
  if(el)el.textContent=fmt(total);
}

function clearOutfit(){
  outfit={top:null,bottom:null,shoes:null,accessory:null};
  renderOutfit();
  toast(t('clear'),'All slots reset');
}
window.clearOutfit=clearOutfit;

function addOutfitToCart(){
  const items=Object.values(outfit).filter(Boolean);
  if(items.length===0){toast('Empty','Add items to your outfit');return}
  items.forEach(p=>{if(p.stock>0){cart.push({...p,size:(p.sizes&&p.sizes[0])||'M',cartId:Date.now()+Math.random()})}});
  saveCart();
  renderCart();
  toast('✓','Outfit added to cart');
}
window.addOutfitToCart=addOutfitToCart;

// ─── DROPS ───
function renderDrops(){
  const content=document.getElementById('drops-content');
  if(!content)return;
  const dp=products.filter(p=>p.status==='drop');
  if(dp.length===0){content.innerHTML='<p style="font-size:11px;opacity:0.3;text-align:center;padding:20px;">No upcoming drops</p>';return}
  content.innerHTML=dp.map(p=>`
    <div class="drop-item">
      <div style="font-size:1.5rem;margin-bottom:6px">${p.icon||'⚡'}</div>
      <div class="drop-item-name">${p.name}</div>
      <div class="drop-item-date">Launching soon</div>
      <div class="drop-timer" id="timer-${p.id}">--:--:--</div>
      <button class="drop-notify-btn" id="btn-${p.id}" onclick="notifyDrop(${p.id},this)">${t('notify')}</button>
    </div>`).join('');
  updateDropTimers();
}
window.renderDrops=renderDrops;

function updateDropTimers(){
  const dp=products.filter(p=>p.status==='drop');
  dp.forEach(p=>{
    const el=document.getElementById('timer-'+p.id);
    if(!el)return;
    const diff=p.dropDate?new Date(p.dropDate)-new Date():86400000;
    if(diff<=0){
      el.textContent='LIVE NOW!';el.style.color='var(--green)';
      const idx=products.findIndex(x=>x.id===p.id);
      if(idx!==-1&&products[idx].status==='drop'){products[idx].status='active';products[idx].tag='NEW';saveProducts();renderProducts();addNotification('DROP LAUNCHED','🔥 '+p.name+' is available!')}
    }else{
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
      el.textContent=d>0?`${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
  });
}

function notifyDrop(id,btn){
  if(notifiedDrops.includes(id))return;
  notifiedDrops.push(id);
  saveNDrops();
  btn.textContent='✓ Notified!';btn.classList.add('notified');
  toast('✓','We\'ll alert you when it drops!');
}
window.notifyDrop=notifyDrop;

// ─── 3D VIEWER ───
function initThreeJS(){
  const container=document.getElementById('three-container');
  if(!container||typeof THREE==='undefined')return;
  try{
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000);
    camera.position.z=5;
    const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
    renderer.setSize(window.innerWidth,window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    container.appendChild(renderer.domElement);
    const geo=new THREE.IcosahedronGeometry(1.2,0);
    const mat=new THREE.MeshPhysicalMaterial({color:0xC49B3D,metalness:0.7,roughness:0.2,wireframe:false,clearcoat:0.3,emissive:0xC49B3D,emissiveIntensity:0.05});
    const mesh=new THREE.Mesh(geo,mat);
    scene.add(mesh);
    const wireGeo=new THREE.IcosahedronGeometry(1.45,1);
    const wireMat=new THREE.MeshBasicMaterial({color:0x7BA3C9,wireframe:true,transparent:true,opacity:0.15});
    const wireMesh=new THREE.Mesh(wireGeo,wireMat);
    scene.add(wireMesh);
    const ambient=new THREE.AmbientLight(0x404060,0.5);
    scene.add(ambient);
    const light1=new THREE.DirectionalLight(0xC49B3D,1);
    light1.position.set(2,3,4);
    scene.add(light1);
    const light2=new THREE.DirectionalLight(0x7BA3C9,0.6);
    light2.position.set(-3,-1,2);
    scene.add(light2);
    function animate(){
      threeAnimId=requestAnimationFrame(animate);
      mesh.rotation.x+=0.003;
      mesh.rotation.y+=0.005;
      wireMesh.rotation.x+=0.002;
      wireMesh.rotation.y+=0.004;
      renderer.render(scene,camera);
    }
    animate();
    window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});
    threeScene=scene;threeRenderer=renderer;threeCube=mesh;
  }catch(e){}
}

function showProductIn3D(p){
  const overlay=document.getElementById('viewer-overlay');
  const container=document.getElementById('viewer-container');
  const nameEl=document.getElementById('viewer-name');
  if(!overlay||!container)return;
  overlay.classList.add('show');
  if(nameEl)nameEl.textContent=p.name;
  container.innerHTML='';
  if(typeof THREE==='undefined'){container.innerHTML='<div style="color:#fff;text-align:center;padding:40px;font-size:14px">3D viewer requires Three.js</div>';return}
  try{
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(40,1,0.1,100);
    camera.position.set(2,1.5,3);
    camera.lookAt(0,0,0);
    const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
    renderer.setSize(container.clientWidth||400,container.clientWidth||400);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0.4);
    container.appendChild(renderer.domElement);
    const hue=(p.id*60)%360;
    const color=new THREE.Color(`hsl(${hue},60%,50%)`);
    const geo=new THREE.TorusKnotGeometry(0.7,0.3,100,16);
    const mat=new THREE.MeshPhysicalMaterial({color:color,metalness:0.6,roughness:0.3,clearcoat:0.4,emissive:color,emissiveIntensity:0.1});
    const mesh=new THREE.Mesh(geo,mat);
    scene.add(mesh);
    const wireGeo=new THREE.TorusKnotGeometry(0.75,0.35,80,12);
    const wireMat=new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:0.1});
    const wireMesh=new THREE.Mesh(wireGeo,wireMat);
    scene.add(wireMesh);
    const ambient=new THREE.AmbientLight(0x404060,0.5);
    scene.add(ambient);
    const l1=new THREE.DirectionalLight(0xC49B3D,1);l1.position.set(2,3,4);scene.add(l1);
    const l2=new THREE.DirectionalLight(0x7BA3C9,0.6);l2.position.set(-3,-1,2);scene.add(l2);
    function animate(){
      requestAnimationFrame(animate);
      mesh.rotation.x+=0.01;mesh.rotation.y+=0.02;
      wireMesh.rotation.x+=0.008;wireMesh.rotation.y+=0.015;
      renderer.render(scene,camera);
    }
    animate();
    const resizeObserver=new ResizeObserver(()=>{
      const w=container.clientWidth||400;
      renderer.setSize(w,w);
      camera.aspect=1;camera.updateProjectionMatrix();
    });
    resizeObserver.observe(container);
  }catch(e){container.innerHTML='<div style="color:#fff;text-align:center;padding:40px">3D error</div>'}
}
window.showProductIn3D=showProductIn3D;
