databases:
  - name: flyra-db
    plan: free
    databaseName: flyra
    user: flyra

services:
  - type: web
    name: flyra
    runtime: python
    buildCommand: ""
    startCommand: gunicorn -w 2 --preload -b 0.0.0.0:$PORT flyra_backend:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: flyra-db
          property: connectionString

  - type: web
    name: flyra-ai
    runtime: python
    buildCommand: ""
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT ai:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: flyra-db
          property: connectionString
